name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-python-function:
    name: Test Python Function
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6.0.1

    - name: Set up Python
      uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c  # v6.0.0
      with:
        python-version: '3.13'

    - name: Install Python dependencies
      working-directory: functions/GreetingFunction
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Python function tests
      working-directory: functions/GreetingFunction
      run: |
        python -m pytest test_function.py -v

    - name: Test function startup
      working-directory: functions/GreetingFunction
      run: |
        python -c "import main; print('Function imports successfully')"

  build-ui:
    name: Build UI
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6.0.1

    - name: Setup Node.js
      uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238  # v6.2.0
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: 'ui/pages/Foundry JS Demo/package-lock.json'

    - name: Install dependencies
      working-directory: 'ui/pages/Foundry JS Demo'
      run: npm ci

    - name: Run linter
      working-directory: 'ui/pages/Foundry JS Demo'
      run: npm run lint

    - name: Run tests
      working-directory: 'ui/pages/Foundry JS Demo'
      run: npm test

    - name: Build UI
      working-directory: 'ui/pages/Foundry JS Demo'
      run: npm run build

    - name: Upload build artifacts
      uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6.0.0
      with:
        name: ui-build-artifacts
        path: 'ui/pages/Foundry JS Demo/src/dist'
        retention-days: 30

  validate-manifest:
    name: Validate Foundry Manifest
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6.0.1

    - name: Validate manifest.yml
      run: |
        # Check if manifest.yml is valid YAML
        python -c "import yaml; yaml.safe_load(open('manifest.yml'))"
        echo "manifest.yml is valid YAML"