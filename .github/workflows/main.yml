name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-python-function:
    name: Test Python Function
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

    - name: Set up Python
      uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c  # v6.0.0
      with:
        python-version: '3.13'

    - name: Install Python dependencies
      working-directory: functions/GreetingFunction
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Python function tests
      working-directory: functions/GreetingFunction
      run: |
        python -m pytest test_function.py -v

    - name: Test function startup
      working-directory: functions/GreetingFunction
      run: |
        python -c "import main; print('Function imports successfully')"

  build-ui:
    name: Build UI
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

    - name: Setup pnpm
      uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2  # v4.0.0
      with:
        version: 10

    - name: Setup Node.js
      uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f  # v6.1.0
      with:
        node-version: '22'
        cache: 'pnpm'
        cache-dependency-path: 'ui/pages/Foundry JS Demo/pnpm-lock.yaml'

    - name: Install dependencies
      working-directory: 'ui/pages/Foundry JS Demo'
      run: pnpm install --frozen-lockfile

    - name: Run linter
      working-directory: 'ui/pages/Foundry JS Demo'
      run: pnpm run lint

    - name: Run tests
      working-directory: 'ui/pages/Foundry JS Demo'
      run: pnpm test

    - name: Build UI
      working-directory: 'ui/pages/Foundry JS Demo'
      run: pnpm run build

    - name: Upload build artifacts
      uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6.0.0
      with:
        name: ui-build-artifacts
        path: 'ui/pages/Foundry JS Demo/src/dist'
        retention-days: 30

  validate-manifest:
    name: Validate Foundry Manifest
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

    - name: Validate manifest.yml
      run: |
        # Check if manifest.yml is valid YAML
        python -c "import yaml; yaml.safe_load(open('manifest.yml'))"
        echo "manifest.yml is valid YAML"