name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-python-function:
    name: Test Python Function
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Python dependencies
      working-directory: functions/GreetingFunction
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Python function tests
      working-directory: functions/GreetingFunction
      run: |
        python -m pytest test_function.py -v

    - name: Test function startup
      working-directory: functions/GreetingFunction
      run: |
        python -c "import main; print('Function imports successfully')"

  build-ui:
    name: Build UI
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: 'ui/pages/Foundry JS Demo/package-lock.json'

    - name: Install dependencies
      working-directory: 'ui/pages/Foundry JS Demo'
      run: npm ci

    - name: Run linter
      working-directory: 'ui/pages/Foundry JS Demo'
      run: npm run lint

    - name: Run tests
      working-directory: 'ui/pages/Foundry JS Demo'
      run: npm test

    - name: Build UI
      working-directory: 'ui/pages/Foundry JS Demo'
      run: npm run build

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ui-build-artifacts
        path: 'ui/pages/Foundry JS Demo/src/dist'
        retention-days: 30

  validate-manifest:
    name: Validate Foundry Manifest
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Validate manifest.yml
      run: |
        # Check if manifest.yml is valid YAML
        python -c "import yaml; yaml.safe_load(open('manifest.yml'))"
        echo "manifest.yml is valid YAML"