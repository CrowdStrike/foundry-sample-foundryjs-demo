<!DOCTYPE html>
<html lang="en" style="width: 100%; height: 100%">
<head>
  <title>foundry-js Demo</title>
  <link rel="stylesheet" href="../node_modules/@crowdstrike/tailwind-toucan-base/index.css" />
  <link rel="stylesheet" href="../node_modules/@crowdstrike/falcon-shoelace/dist/style.css" />
  <link rel="stylesheet" href="./styles.css" />
</head>

<body class="bg-basement">

<div id="app"></div>

<script type="module">
  function addThemeClass() {
    const html = document.querySelector("html");
    const themeIncluded =
      html.classList.contains("theme-dark") ||
      html.classList.contains("theme-light");

    if (!themeIncluded) {
      const isDarkMode = window.matchMedia(
        "(prefers-color-scheme: dark)"
      ).matches;

      html.classList.add(isDarkMode ? "theme-dark" : "theme-light");
    }
  }
  setTimeout(addThemeClass);
</script>

<script src="./app.tsx" type="module"></script>

</body>
</html>
